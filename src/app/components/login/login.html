<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Prijava na ToyShop</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" [(ngModel)]="email" name="email" required>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Lozinka</mat-label>
          <input matInput type="password" [(ngModel)]="password" name="password" required>
        </mat-form-field>

        @if (error) {
        <p class="error-text">{{ error }}</p>
        }

        <button mat-raised-button color="primary" type="submit" class="full-width">PRIJAVI SE</button>
      </form>
    </mat-card-content>
    <mat-card-footer>
      <p>Nemate nalog? <a routerLink="/register">Registrujte se ovde</a></p>
    </mat-card-footer>
  </mat-card>
</div>
