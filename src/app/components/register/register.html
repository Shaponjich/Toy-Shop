<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Kreiraj nalog</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form (ngSubmit)="onSubmit()">
        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Ime</mat-label>
            <input matInput [(ngModel)]="firstName" name="firstName" required>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Prezime</mat-label>
            <input matInput [(ngModel)]="lastName" name="lastName" required>
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" [(ngModel)]="email" name="email" required>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Telefon</mat-label>
          <input matInput [(ngModel)]="phone" name="phone" required>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Adresa</mat-label>
          <input matInput [(ngModel)]="address" name="address" required>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Omiljeni tipovi igračaka (npr. slagalica, figura)</mat-label>
          <input matInput [(ngModel)]="favoriteToyTypes" name="favoriteToyTypes">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Lozinka</mat-label>
          <input matInput type="password" [(ngModel)]="password" name="password" required>
        </mat-form-field>

        @if (error) {
        <p class="error-text">{{ error }}</p>
        }

        <button mat-raised-button color="primary" type="submit" class="full-width">REGISTRUJ SE</button>
      </form>
    </mat-card-content>
    <mat-card-footer>
      <p>Već imate nalog? <a routerLink="/login">Prijavite se</a></p>
    </mat-card-footer>
  </mat-card>
</div>
